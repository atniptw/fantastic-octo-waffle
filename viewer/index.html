<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Unity Preview Viewer</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1>Asset Viewer</h1>
        <div class="toolbar" aria-label="Viewer filters">
          <label for="mod-filter" class="toolbar-label">Mod</label>
          <select id="mod-filter" class="toolbar-select" aria-label="Filter assets by mod">
            <option value="__all__">All Mods</option>
          </select>
        </div>
      </header>
      <section class="layout">
        <section id="gallery" class="gallery" aria-live="polite">
          <div id="group-tabs" class="group-tabs" role="tablist" aria-label="Asset groups"></div>
          <div id="group-panel" class="group-panel"></div>
        </section>
        <aside id="model-panel" class="model-panel" aria-live="polite">
          <h2>3D Preview</h2>
          <div id="model-canvas" class="model-canvas" role="img" aria-label="3D model canvas"></div>
        </aside>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
